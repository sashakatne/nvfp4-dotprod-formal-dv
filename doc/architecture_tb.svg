<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="820" height="560" viewBox="0 0 820 560">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#444"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aa3333"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3355aa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="560" fill="#f9f9f9" rx="6"/>

  <!-- Title -->
  <text x="410" y="28" font-family="monospace" font-size="15" font-weight="bold"
        text-anchor="middle" fill="#111">Testbench Architecture: Directed Sim + FPV</text>
  <text x="410" y="46" font-family="monospace" font-size="11"
        text-anchor="middle" fill="#555">dotprod_int8_directed_tb.sv (sim path) + dotprod_top_sva (FPV path)</text>

  <!-- ======================== STIMULUS ======================== -->
  <rect x="20" y="80" width="150" height="110" rx="5" fill="#fff7e0" stroke="#c8a000" stroke-width="2"/>
  <text x="95" y="103" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle" fill="#222">Stimulus</text>
  <text x="95" y="120" font-family="monospace" font-size="10" text-anchor="middle" fill="#555">initial block</text>
  <text x="95" y="136" font-family="monospace" font-size="10" text-anchor="middle" fill="#555">6 directed cases:</text>
  <text x="95" y="151" font-family="monospace" font-size="9" text-anchor="middle" fill="#777">zeros, min*max, max*max</text>
  <text x="95" y="165" font-family="monospace" font-size="9" text-anchor="middle" fill="#777">cancel, single, ramp</text>
  <text x="95" y="180" font-family="monospace" font-size="9" text-anchor="middle" fill="#888">a[8], b[8] 8b signed</text>

  <!-- ======================== DUT ======================== -->
  <rect x="240" y="70" width="200" height="140" rx="5" fill="#e8f0e8" stroke="#3a7a3a" stroke-width="2.5"/>
  <text x="340" y="96" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle" fill="#222">dotprod_top</text>
  <text x="340" y="114" font-family="monospace" font-size="10" text-anchor="middle" fill="#555">(DUT)</text>
  <text x="340" y="132" font-family="monospace" font-size="10" text-anchor="middle" fill="#777">mode = FMT_INT8</text>
  <text x="340" y="149" font-family="monospace" font-size="10" text-anchor="middle" fill="#777">front_end_int8 x8</text>
  <text x="340" y="165" font-family="monospace" font-size="10" text-anchor="middle" fill="#777">mul_lane x8</text>
  <text x="340" y="181" font-family="monospace" font-size="10" text-anchor="middle" fill="#777">align + acc_tree + round</text>
  <text x="340" y="200" font-family="monospace" font-size="9" text-anchor="middle" fill="#888">combinational only</text>

  <!-- stimulus -> DUT -->
  <line x1="170" y1="130" x2="240" y2="130" stroke="#444" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="205" y="123" font-family="monospace" font-size="9" text-anchor="middle" fill="#444">a,b</text>

  <!-- ======================== GOLDEN REF ======================== -->
  <rect x="240" y="290" width="200" height="80" rx="5" fill="#f0e8f8" stroke="#7a3a9a" stroke-width="2"/>
  <text x="340" y="313" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle" fill="#222">dotprod_ref</text>
  <text x="340" y="330" font-family="monospace" font-size="10" text-anchor="middle" fill="#555">SV function (golden)</text>
  <text x="340" y="347" font-family="monospace" font-size="9" text-anchor="middle" fill="#777">exact accumulate, sat_cast</text>
  <text x="340" y="362" font-family="monospace" font-size="9" text-anchor="middle" fill="#888">single source of truth</text>

  <!-- stimulus -> dotprod_ref -->
  <polyline points="95,190 95,330 240,330" stroke="#7a3a9a" stroke-width="1.5" fill="none"
            stroke-dasharray="5,3" marker-end="url(#arrowhead-blue)"/>
  <text x="140" y="280" font-family="monospace" font-size="9" fill="#7a3a9a">a,b (same inputs)</text>

  <!-- ======================== SCOREBOARD (sim) ======================== -->
  <rect x="510" y="160" width="180" height="90" rx="5" fill="#fde8e8" stroke="#aa3333" stroke-width="2"/>
  <text x="600" y="183" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle" fill="#222">Scoreboard</text>
  <text x="600" y="200" font-family="monospace" font-size="10" text-anchor="middle" fill="#555">check() task</text>
  <text x="600" y="217" font-family="monospace" font-size="10" text-anchor="middle" fill="#555">result === dotprod_ref?</text>
  <text x="600" y="234" font-family="monospace" font-size="9" text-anchor="middle" fill="#777">sat === ref_sat?</text>
  <text x="600" y="247" font-family="monospace" font-size="9" text-anchor="middle" fill="#888">$error + $fatal on mismatch</text>

  <!-- DUT result -> scoreboard -->
  <line x1="440" y1="180" x2="510" y2="195" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="472" y="180" font-family="monospace" font-size="9" fill="#444">result, sat</text>

  <!-- dotprod_ref -> scoreboard -->
  <polyline points="440,330 478,330 478,230 510,215" stroke="#7a3a9a" stroke-width="1.5" fill="none"
            stroke-dasharray="5,3" marker-end="url(#arrowhead-blue)"/>
  <text x="488" y="290" font-family="monospace" font-size="9" fill="#7a3a9a">ref_r, ref_sat</text>

  <!-- ======================== PASS / FAIL ======================== -->
  <rect x="510" y="300" width="180" height="60" rx="5" fill="#dce8f8" stroke="#5a8bbf" stroke-width="2"/>
  <text x="600" y="323" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle" fill="#222">PASS / FAIL</text>
  <text x="600" y="341" font-family="monospace" font-size="10" text-anchor="middle" fill="#555">"DOTPROD_INT8_DIRECTED</text>
  <text x="600" y="355" font-family="monospace" font-size="10" text-anchor="middle" fill="#555">PASS (6 cases)"</text>

  <!-- scoreboard -> PASS/FAIL -->
  <line x1="600" y1="250" x2="600" y2="300" stroke="#444" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ======================== FPV BIND PATH ======================== -->
  <!-- SVA module -->
  <rect x="240" y="430" width="200" height="90" rx="5" fill="#e0f0ff" stroke="#3355aa" stroke-width="2"/>
  <text x="340" y="454" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle" fill="#222">dotprod_top_sva</text>
  <text x="340" y="471" font-family="monospace" font-size="10" text-anchor="middle" fill="#555">bound via bind statement</text>
  <text x="340" y="488" font-family="monospace" font-size="10" text-anchor="middle" fill="#555">am_int8_mode (assume)</text>
  <text x="340" y="504" font-family="monospace" font-size="10" text-anchor="middle" fill="#555">a_result_matches_ref (assert)</text>
  <text x="340" y="520" font-family="monospace" font-size="9" text-anchor="middle" fill="#888">c_sat_unreachable, c_pos, c_neg</text>

  <!-- bind arrow from DUT to SVA -->
  <polyline points="340,210 340,260 340,430" stroke="#3355aa" stroke-width="1.5" fill="none"
            stroke-dasharray="5,3" marker-end="url(#arrowhead-blue)"/>
  <text x="355" y="360" font-family="monospace" font-size="9" fill="#3355aa">bind</text>
  <text x="355" y="372" font-family="monospace" font-size="9" fill="#3355aa">(DUT ports)</text>

  <!-- dotprod_ref -> SVA (also uses golden) -->
  <line x1="340" y1="370" x2="340" y2="430" stroke="#7a3a9a" stroke-width="1.5"
        stroke-dasharray="4,3" marker-end="url(#arrowhead-blue)"/>
  <text x="358" y="408" font-family="monospace" font-size="9" fill="#7a3a9a">same dotprod_ref</text>

  <!-- FPV engine -->
  <rect x="510" y="430" width="180" height="90" rx="5" fill="#e0f0ff" stroke="#3355aa" stroke-width="2"/>
  <text x="600" y="454" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle" fill="#222">VC Formal FPV</text>
  <text x="600" y="471" font-family="monospace" font-size="10" text-anchor="middle" fill="#555">check_fv -block</text>
  <text x="600" y="488" font-family="monospace" font-size="10" text-anchor="middle" fill="#555">clock -none</text>
  <text x="600" y="504" font-family="monospace" font-size="10" text-anchor="middle" fill="#555">reset -none</text>
  <text x="600" y="520" font-family="monospace" font-size="9" text-anchor="middle" fill="#888">PROVEN / FALSIFIED / UNREACHABLE</text>

  <!-- SVA -> FPV engine -->
  <line x1="440" y1="475" x2="510" y2="475" stroke="#3355aa" stroke-width="1.5" marker-end="url(#arrowhead-blue)"/>
  <text x="475" y="468" font-family="monospace" font-size="9" fill="#3355aa">properties</text>

  <!-- ======================== Boundary boxes ======================== -->
  <!-- Sim TB boundary -->
  <rect x="10" y="58" width="500" height="360" rx="8" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="10,5"/>
  <text x="18" y="75" font-family="monospace" font-size="10" fill="#888">directed sim (dotprod_int8_directed_tb.sv)</text>

  <!-- FPV boundary -->
  <rect x="220" y="415" width="490" height="120" rx="8" fill="none" stroke="#3355aa" stroke-width="1.5" stroke-dasharray="10,5"/>
  <text x="228" y="430" font-family="monospace" font-size="10" fill="#3355aa">FPV path (bind_dotprod_top_sva + fpv_run_top.tcl)</text>
</svg>

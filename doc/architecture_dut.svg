<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="580" viewBox="0 0 1000 580">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 14px Arial, sans-serif; fill: #475569; }
      .lane-title { font: 700 16px Arial, sans-serif; fill: #111827; }
      .box-title { font: 700 14px Arial, sans-serif; fill: #111827; }
      .box-text { font: 12px Arial, sans-serif; fill: #475569; }
      .mono { font: 12px Menlo, Consolas, monospace; fill: #334155; }
    </style>
  </defs>

  <rect width="1000" height="580" fill="#fbfcfe"/>
  <text x="500" y="38" text-anchor="middle" class="title">Unified dotprod_top Datapath</text>
  <text x="500" y="62" text-anchor="middle" class="subtitle">One combinational top selects INT8, BF16, or NVFP4 results by mode</text>

  <rect x="35" y="215" width="150" height="125" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="110" y="246" text-anchor="middle" class="lane-title">inputs</text>
  <text x="110" y="274" text-anchor="middle" class="mono">a[8] / b[8]</text>
  <text x="110" y="298" text-anchor="middle" class="mono">16-bit lanes</text>
  <text x="110" y="322" text-anchor="middle" class="mono">mode fmt_e</text>

  <rect x="245" y="100" width="465" height="95" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="270" y="127" class="lane-title">INT8 path</text>
  <rect x="270" y="145" width="115" height="30" rx="5" fill="#ffedd5" stroke="#ea580c"/>
  <text x="327.5" y="165" text-anchor="middle" class="box-title">low byte</text>
  <rect x="420" y="145" width="115" height="30" rx="5" fill="#ffedd5" stroke="#ea580c"/>
  <text x="477.5" y="165" text-anchor="middle" class="box-title">8 products</text>
  <rect x="570" y="145" width="115" height="30" rx="5" fill="#ffedd5" stroke="#ea580c"/>
  <text x="627.5" y="165" text-anchor="middle" class="box-title">exact sum</text>

  <rect x="245" y="240" width="465" height="105" rx="12" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="270" y="268" class="lane-title">BF16 path</text>
  <rect x="270" y="288" width="118" height="32" rx="5" fill="#dcfce7" stroke="#16a34a"/>
  <text x="329" y="309" text-anchor="middle" class="box-title">decode + mul</text>
  <rect x="420" y="288" width="118" height="32" rx="5" fill="#dcfce7" stroke="#16a34a"/>
  <text x="479" y="309" text-anchor="middle" class="box-title">align + sum</text>
  <rect x="570" y="288" width="118" height="32" rx="5" fill="#dcfce7" stroke="#16a34a"/>
  <text x="629" y="309" text-anchor="middle" class="box-title">RNE / special</text>

  <rect x="245" y="390" width="465" height="105" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="270" y="418" class="lane-title">NVFP4 path</text>
  <rect x="270" y="438" width="118" height="32" rx="5" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="329" y="459" text-anchor="middle" class="box-title">unpack block</text>
  <rect x="420" y="438" width="118" height="32" rx="5" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="479" y="459" text-anchor="middle" class="box-title">inner sum</text>
  <rect x="570" y="438" width="118" height="32" rx="5" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="629" y="459" text-anchor="middle" class="box-title">scale + FP32</text>

  <rect x="780" y="230" width="145" height="150" rx="12" fill="#f8fafc" stroke="#475569" stroke-width="2.5"/>
  <text x="852.5" y="260" text-anchor="middle" class="lane-title">mode mux</text>
  <text x="852.5" y="290" text-anchor="middle" class="mono">result[31:0]</text>
  <text x="852.5" y="314" text-anchor="middle" class="mono">status</text>
  <text x="852.5" y="338" text-anchor="middle" class="mono">sat alias</text>
  <text x="852.5" y="362" text-anchor="middle" class="box-text">default: INT8</text>

  <line x1="185" y1="277" x2="245" y2="147" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="185" y1="277" x2="245" y2="292" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="185" y1="277" x2="245" y2="442" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <line x1="685" y1="160" x2="780" y2="260" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="688" y1="304" x2="780" y2="304" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="688" y1="454" x2="780" y2="350" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <rect x="245" y="515" width="680" height="40" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="585" y="540" text-anchor="middle" class="box-text">All three format paths are live in the combinational top; the selected mode chooses the visible result/status.</text>
</svg>

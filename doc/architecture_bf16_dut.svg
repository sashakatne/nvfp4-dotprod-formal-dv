<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 14px Arial, sans-serif; fill: #475569; }
      .box-title { font: 700 15px Arial, sans-serif; fill: #111827; }
      .box-text { font: 13px Arial, sans-serif; fill: #475569; }
      .tiny { font: 12px Arial, sans-serif; fill: #64748b; }
      .mono { font: 12px Menlo, Consolas, monospace; fill: #334155; }
    </style>
  </defs>

  <rect width="1000" height="560" fill="#fbfcfe"/>
  <text x="500" y="38" text-anchor="middle" class="title">BF16 Datapath and Formal Split</text>
  <text x="500" y="62" text-anchor="middle" class="subtitle">Eight BF16 lane products feed an exact fixed-point accumulator, special ladder, and final FP32 rounder</text>

  <rect x="35" y="220" width="140" height="100" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="105" y="250" text-anchor="middle" class="box-title">BF16 inputs</text>
  <text x="105" y="276" text-anchor="middle" class="mono">a[0..7]</text>
  <text x="105" y="296" text-anchor="middle" class="mono">b[0..7]</text>

  <rect x="235" y="145" width="150" height="70" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="310" y="174" text-anchor="middle" class="box-title">lane product</text>
  <text x="310" y="196" text-anchor="middle" class="box-text">decode, FTZ, multiply</text>
  <rect x="235" y="255" width="150" height="70" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="310" y="284" text-anchor="middle" class="box-title">align_bf16</text>
  <text x="310" y="306" text-anchor="middle" class="box-text">shift into 56-bit grid</text>
  <rect x="235" y="365" width="150" height="70" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="310" y="394" text-anchor="middle" class="box-title">exact sum</text>
  <text x="310" y="416" text-anchor="middle" class="box-text">8-lane accumulator</text>

  <rect x="470" y="145" width="175" height="82" rx="10" fill="#fdf2f8" stroke="#be185d" stroke-width="2"/>
  <text x="557.5" y="176" text-anchor="middle" class="box-title">special_case_bf16</text>
  <text x="557.5" y="199" text-anchor="middle" class="box-text">NaN, Inf, invalid</text>
  <text x="557.5" y="218" text-anchor="middle" class="tiny">bypass result/status</text>

  <rect x="470" y="310" width="175" height="82" rx="10" fill="#e8f3ff" stroke="#2563eb" stroke-width="2"/>
  <text x="557.5" y="341" text-anchor="middle" class="box-title">final_round_bf16</text>
  <text x="557.5" y="364" text-anchor="middle" class="box-text">RNE to binary32</text>
  <text x="557.5" y="383" text-anchor="middle" class="tiny">special bypass wins</text>

  <rect x="710" y="305" width="130" height="92" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="775" y="335" text-anchor="middle" class="box-title">mode mux</text>
  <text x="775" y="361" text-anchor="middle" class="mono">result</text>
  <text x="775" y="381" text-anchor="middle" class="mono">status</text>
  <rect x="880" y="315" width="92" height="72" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="926" y="344" text-anchor="middle" class="box-title">FP32</text>
  <text x="926" y="366" text-anchor="middle" class="box-text">+ flags</text>

  <line x1="175" y1="270" x2="235" y2="180" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="310" y1="215" x2="310" y2="255" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="310" y1="325" x2="310" y2="365" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M385 180 H470" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M385 400 H430 V351 H470" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M557 227 V310" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="645" y1="351" x2="710" y2="351" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="840" y1="351" x2="880" y2="351" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <rect x="695" y="110" width="270" height="142" rx="12" fill="#fffbea" stroke="#ca8a04" stroke-width="2"/>
  <text x="830" y="140" text-anchor="middle" class="box-title">formal decomposition</text>
  <text x="718" y="166" class="box-text">1. lane product == BF16 golden</text>
  <text x="718" y="190" class="box-text">2. align lanes into fixed grid</text>
  <text x="718" y="214" class="box-text">3. final round / bypass exact</text>
  <text x="718" y="238" class="box-text">4. top proves pre-round sum + specials</text>

  <rect x="235" y="475" width="730" height="42" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="600" y="501" text-anchor="middle" class="box-text">The top proof keeps the nonlinear shifter and rounder out of the main equivalence miter.</text>
</svg>

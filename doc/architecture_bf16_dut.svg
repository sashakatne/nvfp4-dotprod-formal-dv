<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="700" viewBox="0 0 860 700">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#444"/>
    </marker>
  </defs>

  <rect width="860" height="700" fill="#f9f9f9" rx="6"/>

  <text x="430" y="30" font-family="monospace" font-size="15" font-weight="bold"
        text-anchor="middle" fill="#111">dotprod_top — BF16 Datapath (M3)</text>
  <text x="430" y="48" font-family="monospace" font-size="11"
        text-anchor="middle" fill="#555">N_LANES=8, BF16_W=16, ACC_BF16_W=56 (LSB 2^-30), FP32_W=32, window E in [119,134]</text>

  <!-- Inputs -->
  <rect x="20" y="90" width="120" height="34" rx="4" fill="#dce8f8" stroke="#5a8bbf" stroke-width="1.5"/>
  <text x="80" y="103" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">a[0..7]</text>
  <text x="80" y="117" font-family="monospace" font-size="10" text-anchor="middle" fill="#555">BF16 x8</text>

  <rect x="20" y="132" width="120" height="34" rx="4" fill="#dce8f8" stroke="#5a8bbf" stroke-width="1.5"/>
  <text x="80" y="145" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">b[0..7]</text>
  <text x="80" y="159" font-family="monospace" font-size="10" text-anchor="middle" fill="#555">BF16 x8</text>

  <rect x="20" y="174" width="120" height="30" rx="4" fill="#dce8f8" stroke="#5a8bbf" stroke-width="1.5"/>
  <text x="80" y="193" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">mode=BF16</text>

  <!-- Blackbox boundary: mul_lane_bf16 -->
  <rect x="180" y="80" width="200" height="150" rx="6" fill="#fdece0" stroke="#c8722b"
        stroke-width="2" stroke-dasharray="6 4"/>
  <text x="280" y="98" font-family="monospace" font-size="11" font-weight="bold"
        text-anchor="middle" fill="#a85a1a">AG blackbox boundary</text>

  <rect x="200" y="110" width="160" height="46" rx="4" fill="#fff3e0" stroke="#c8722b" stroke-width="1.5"/>
  <text x="280" y="128" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">mul_lane_bf16 x8</text>
  <text x="280" y="143" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">front_end_bf16 (FTZ) + mul</text>

  <rect x="200" y="166" width="160" height="46" rx="4" fill="#fff3e0" stroke="#c8722b" stroke-width="1"/>
  <text x="280" y="182" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">assumed: product ==</text>
  <text x="280" y="196" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">ref_mul_bf16(a,b)</text>

  <!-- align -->
  <rect x="200" y="260" width="160" height="44" rx="4" fill="#e6f2e6" stroke="#4a8a4a" stroke-width="1.5"/>
  <text x="280" y="278" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">align_bf16 x8</text>
  <text x="280" y="293" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">shift by q+30, signed 56b</text>

  <!-- acc tree -->
  <rect x="200" y="330" width="160" height="44" rx="4" fill="#e6f2e6" stroke="#4a8a4a" stroke-width="1.5"/>
  <text x="280" y="348" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">exact_acc_tree #(56)</text>
  <text x="280" y="363" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">exact 8-lane sum -> sum_bf16</text>

  <!-- special case (bypass) -->
  <rect x="440" y="260" width="180" height="70" rx="4" fill="#f3e6f2" stroke="#8a4a8a" stroke-width="1.5"/>
  <text x="530" y="282" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">special_case_bf16</text>
  <text x="530" y="298" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">NaN / +-Inf / Inf-Inf ladder</text>
  <text x="530" y="312" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">special_valid/result/status</text>

  <!-- final round -->
  <rect x="200" y="400" width="420" height="52" rx="4" fill="#e0ecf8" stroke="#3a6ea5" stroke-width="1.5"/>
  <text x="410" y="420" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">final_round_bf16 — RNE 56b sum -> FP32, or special bypass</text>
  <text x="410" y="436" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">leading-one + guard/round/sticky, ties-to-even; special passes through</text>

  <!-- mode mux -->
  <rect x="200" y="478" width="420" height="46" rx="4" fill="#ececec" stroke="#777" stroke-width="1.5"/>
  <text x="410" y="496" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">result / status mux (by mode)</text>
  <text x="410" y="511" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">INT8 path (low byte) selected when mode=INT8</text>

  <!-- outputs -->
  <rect x="680" y="480" width="150" height="34" rx="4" fill="#dfeede" stroke="#4a8a4a" stroke-width="1.5"/>
  <text x="755" y="500" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">result[31:0] (FP32)</text>

  <rect x="680" y="524" width="150" height="34" rx="4" fill="#dfeede" stroke="#4a8a4a" stroke-width="1.5"/>
  <text x="755" y="544" font-family="monospace" font-size="10" text-anchor="middle" fill="#222">status {inv,nan,inf,sat}</text>

  <!-- AG proof note -->
  <rect x="200" y="560" width="620" height="110" rx="6" fill="#fffbe6" stroke="#b8a11a" stroke-width="1.5"/>
  <text x="210" y="580" font-family="monospace" font-size="11" font-weight="bold" fill="#7a6a10">Assume-Guarantee top proof (four-way, composed by transitivity)</text>
  <text x="210" y="600" font-family="monospace" font-size="10" fill="#555">1. lane:  mul_lane_bf16 == ref_mul_bf16            (blackboxed above, assumed here)</text>
  <text x="210" y="616" font-family="monospace" font-size="10" fill="#555">2. align: align_bf16 lane == ref_align_bf16_lane   (standalone, 8/8 proven)</text>
  <text x="210" y="632" font-family="monospace" font-size="10" fill="#555">3. round: final_round_bf16 == ref_round / bypass   (standalone, proven)</text>
  <text x="210" y="648" font-family="monospace" font-size="10" fill="#555">4. top:   sum_bf16 == sum(aligned lanes) + special ladder == golden pre-round</text>
  <text x="210" y="664" font-family="monospace" font-size="10" fill="#555">=> result == dotprod_ref_bf16 by transitivity (shifter + rounder kept out of the top miter)</text>

  <!-- arrows -->
  <line x1="140" y1="107" x2="198" y2="128" stroke="#444" stroke-width="1.3" marker-end="url(#arrowhead)"/>
  <line x1="140" y1="149" x2="198" y2="140" stroke="#444" stroke-width="1.3" marker-end="url(#arrowhead)"/>
  <line x1="280" y1="212" x2="280" y2="258" stroke="#444" stroke-width="1.3" marker-end="url(#arrowhead)"/>
  <line x1="280" y1="304" x2="280" y2="328" stroke="#444" stroke-width="1.3" marker-end="url(#arrowhead)"/>
  <line x1="360" y1="200" x2="440" y2="270" stroke="#444" stroke-width="1.1" marker-end="url(#arrowhead)"/>
  <line x1="280" y1="374" x2="280" y2="398" stroke="#444" stroke-width="1.3" marker-end="url(#arrowhead)"/>
  <line x1="530" y1="330" x2="450" y2="398" stroke="#444" stroke-width="1.1" marker-end="url(#arrowhead)"/>
  <line x1="410" y1="452" x2="410" y2="476" stroke="#444" stroke-width="1.3" marker-end="url(#arrowhead)"/>
  <line x1="620" y1="500" x2="678" y2="500" stroke="#444" stroke-width="1.3" marker-end="url(#arrowhead)"/>
  <line x1="620" y1="510" x2="678" y2="538" stroke="#444" stroke-width="1.3" marker-end="url(#arrowhead)"/>
</svg>

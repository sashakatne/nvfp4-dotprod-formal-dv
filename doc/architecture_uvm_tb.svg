<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#15803d"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#c2410c"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#7e22ce"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 14px Arial, sans-serif; fill: #475569; }
      .group-title { font: 700 16px Arial, sans-serif; }
      .box-title { font: 700 15px Arial, sans-serif; fill: #111827; }
      .box-text { font: 13px Arial, sans-serif; fill: #475569; }
      .tiny { font: 12px Arial, sans-serif; fill: #64748b; }
      .mono { font: 12px Menlo, Consolas, monospace; fill: #334155; }
      .label { font: 12px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="1000" height="620" fill="#fbfcfe"/>
  <text x="500" y="38" text-anchor="middle" class="title">UVM Environment Architecture</text>
  <text x="500" y="62" text-anchor="middle" class="subtitle">Drivers control ready/valid; monitors publish accepted transactions to scoreboard and coverage</text>

  <rect x="40" y="115" width="270" height="155" rx="12" fill="#e8f3ff" stroke="#2563eb" stroke-width="2"/>
  <text x="175" y="143" text-anchor="middle" class="group-title" fill="#1d4ed8">dotprod_in_agent</text>
  <rect x="70" y="170" width="100" height="58" rx="7" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="120" y="194" text-anchor="middle" class="box-title">sequencer</text>
  <text x="120" y="213" text-anchor="middle" class="box-text">seq items</text>
  <rect x="195" y="170" width="90" height="58" rx="7" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="240" y="194" text-anchor="middle" class="box-title">driver</text>
  <text x="240" y="213" text-anchor="middle" class="box-text">input vif</text>
  <line x1="170" y1="199" x2="195" y2="199" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="40" y="385" width="270" height="120" rx="12" fill="#e7f8ee" stroke="#16a34a" stroke-width="2"/>
  <text x="175" y="413" text-anchor="middle" class="group-title" fill="#15803d">dotprod_out_agent</text>
  <rect x="85" y="430" width="180" height="62" rx="7" fill="#bbf7d0" stroke="#15803d" stroke-width="1.5"/>
  <text x="175" y="453" text-anchor="middle" class="box-title">output driver</text>
  <text x="175" y="473" text-anchor="middle" class="tiny">drives out_ready</text>
  <text x="175" y="488" text-anchor="middle" class="tiny">backpressure</text>

  <rect x="390" y="235" width="190" height="165" rx="12" fill="#e2e8f0" stroke="#475569" stroke-width="2.5"/>
  <text x="485" y="266" text-anchor="middle" class="box-title">DUT: dotprod_seq</text>
  <text x="485" y="294" text-anchor="middle" class="mono">in_valid / in_ready</text>
  <text x="485" y="314" text-anchor="middle" class="mono">a[8], b[8], mode</text>
  <text x="485" y="342" text-anchor="middle" class="mono">out_valid / out_ready</text>
  <text x="485" y="362" text-anchor="middle" class="mono">result, status, sat</text>
  <text x="485" y="386" text-anchor="middle" class="tiny">two-stage pipeline</text>

  <rect x="390" y="115" width="190" height="78" rx="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="485" y="145" text-anchor="middle" class="box-title">input monitor</text>
  <text x="485" y="168" text-anchor="middle" class="box-text">accepted input beats</text>

  <rect x="625" y="300" width="160" height="78" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="705" y="330" text-anchor="middle" class="box-title">output monitor</text>
  <text x="705" y="353" text-anchor="middle" class="box-text">accepted results</text>

  <rect x="810" y="120" width="160" height="205" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="890" y="151" text-anchor="middle" class="group-title" fill="#c2410c">scoreboard</text>
  <rect x="835" y="176" width="110" height="46" rx="6" fill="#fed7aa" stroke="#ea580c" stroke-width="1.3"/>
  <text x="890" y="198" text-anchor="middle" class="box-title">write_in</text>
  <text x="890" y="215" text-anchor="middle" class="tiny">predict expected</text>
  <rect x="835" y="240" width="110" height="46" rx="6" fill="#fed7aa" stroke="#ea580c" stroke-width="1.3"/>
  <text x="890" y="262" text-anchor="middle" class="box-title">write_out</text>
  <text x="890" y="279" text-anchor="middle" class="tiny">compare actual</text>
  <text x="890" y="309" text-anchor="middle" class="tiny">golden refs in ref/</text>

  <rect x="810" y="395" width="160" height="115" rx="12" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
  <text x="890" y="426" text-anchor="middle" class="group-title" fill="#7e22ce">coverage</text>
  <rect x="835" y="450" width="50" height="34" rx="6" fill="#e9d5ff" stroke="#9333ea" stroke-width="1.3"/>
  <text x="860" y="472" text-anchor="middle" class="box-text">value</text>
  <rect x="895" y="450" width="50" height="34" rx="6" fill="#e9d5ff" stroke="#9333ea" stroke-width="1.3"/>
  <text x="920" y="472" text-anchor="middle" class="box-text">proto</text>

  <path d="M285 199 H350 V286 H390" fill="none" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="350" y="187" text-anchor="middle" class="label">drive input interface</text>
  <path d="M265 460 H350 V350 H390" fill="none" stroke="#15803d" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <text x="350" y="445" text-anchor="middle" class="label">drive out_ready</text>

  <path d="M425 235 V193" fill="none" stroke="#64748b" stroke-width="1.7" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <path d="M580 342 H625" fill="none" stroke="#64748b" stroke-width="1.7" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <path d="M580 154 H735 V199 H835" fill="none" stroke="#c2410c" stroke-width="2.2" marker-end="url(#arrow-orange)"/>
  <text x="725" y="187" text-anchor="end" class="label">ap_in</text>
  <path d="M785 339 H798 V263 H835" fill="none" stroke="#c2410c" stroke-width="2.2" marker-end="url(#arrow-orange)"/>
  <text x="800" y="327" class="label">ap_out</text>

  <path d="M580 154 H735 V454 H835" fill="none" stroke="#7e22ce" stroke-width="2.2" marker-end="url(#arrow-purple)"/>
  <path d="M705 378 V467 H835" fill="none" stroke="#7e22ce" stroke-width="2.2" marker-end="url(#arrow-purple)"/>

  <rect x="390" y="465" width="190" height="58" rx="9" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="485" y="489" text-anchor="middle" class="box-title">shared checker model</text>
  <text x="485" y="509" text-anchor="middle" class="tiny">same ref functions used by FPV and UVM</text>
</svg>

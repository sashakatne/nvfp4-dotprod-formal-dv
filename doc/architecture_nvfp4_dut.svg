<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="720" viewBox="0 0 880 720">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#444"/>
    </marker>
  </defs>

  <rect width="880" height="720" fill="#f9f9f9" rx="6"/>

  <text x="440" y="30" font-family="monospace" font-size="15" font-weight="bold"
        text-anchor="middle" fill="#111">dotprod_top — NVFP4 Datapath (M4)</text>
  <text x="440" y="48" font-family="monospace" font-size="11"
        text-anchor="middle" fill="#555">block-16 E2M1 + UE4M3 scale, packed in a/b[8x16b]; NVFP4_INNER_W=13; result FP32</text>

  <!-- Inputs -->
  <rect x="20" y="92" width="130" height="34" rx="4" fill="#dce8f8" stroke="#5a8bbf" stroke-width="1.5"/>
  <text x="85" y="105" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">a[8x16b]</text>
  <text x="85" y="119" font-family="monospace" font-size="9" text-anchor="middle" fill="#555">16 E2M1 + UE4M3</text>

  <rect x="20" y="134" width="130" height="34" rx="4" fill="#dce8f8" stroke="#5a8bbf" stroke-width="1.5"/>
  <text x="85" y="147" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">b[8x16b]</text>
  <text x="85" y="161" font-family="monospace" font-size="9" text-anchor="middle" fill="#555">16 E2M1 + UE4M3</text>

  <rect x="20" y="176" width="130" height="30" rx="4" fill="#dce8f8" stroke="#5a8bbf" stroke-width="1.5"/>
  <text x="85" y="195" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">mode=NVFP4</text>

  <!-- unpack -->
  <rect x="185" y="110" width="150" height="44" rx="4" fill="#eef" stroke="#5a8bbf" stroke-width="1.3"/>
  <text x="260" y="128" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">nvfp4_unpack</text>
  <text x="260" y="143" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">16 E2M1 (nv_ea/nv_eb), sA/sB</text>

  <!-- Blackbox boundary: mul_lane_nvfp4 -->
  <rect x="185" y="180" width="230" height="88" rx="6" fill="#fdece0" stroke="#c8722b"
        stroke-width="2" stroke-dasharray="6 4"/>
  <text x="300" y="198" font-family="monospace" font-size="11" font-weight="bold"
        text-anchor="middle" fill="#a85a1a">AG blackbox boundary</text>
  <rect x="205" y="208" width="190" height="46" rx="4" fill="#fff3e0" stroke="#c8722b" stroke-width="1.5"/>
  <text x="300" y="226" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">mul_lane_nvfp4 x16</text>
  <text x="300" y="241" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">assumed == ref_mul_nvfp4(a,b)</text>

  <!-- align -->
  <rect x="205" y="292" width="190" height="42" rx="4" fill="#e6f2e6" stroke="#4a8a4a" stroke-width="1.5"/>
  <text x="300" y="309" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">align_nvfp4 x16</text>
  <text x="300" y="324" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">sign-extend prod -> 13b (a_align_lane)</text>

  <!-- acc tree -->
  <rect x="205" y="356" width="190" height="42" rx="4" fill="#e6f2e6" stroke="#4a8a4a" stroke-width="1.5"/>
  <text x="300" y="373" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">exact_acc_tree #(16)</text>
  <text x="300" y="388" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">exact inner_sum (a_inner_is_lane_sum)</text>

  <!-- scale multiply -->
  <rect x="470" y="180" width="200" height="74" rx="4" fill="#f3e6f2" stroke="#8a4a8a" stroke-width="1.5"/>
  <text x="570" y="202" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">scale_mul_nvfp4</text>
  <text x="570" y="218" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">sA·sB: scale_sig, scale_exp</text>
  <text x="570" y="232" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">scale_is_nan (0x7F)</text>
  <text x="570" y="246" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">(a_scale_sig/exp/nan_ref)</text>

  <!-- final round -->
  <rect x="205" y="420" width="465" height="50" rx="4" fill="#e0ecf8" stroke="#3a6ea5" stroke-width="1.5"/>
  <text x="437" y="440" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">final_round_nvfp4 — M = inner_sum x scale_sig, encode M x 2^(scale_exp-2) -> FP32</text>
  <text x="437" y="456" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">exact (|M| &lt; 2^24, no rounding); NaN scale -> QNaN 0x7FC00000</text>

  <!-- mode mux -->
  <rect x="205" y="496" width="465" height="46" rx="4" fill="#ececec" stroke="#777" stroke-width="1.5"/>
  <text x="437" y="514" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">result / status mux (by mode)</text>
  <text x="437" y="529" font-family="monospace" font-size="9" text-anchor="middle" fill="#666">INT8 / BF16 paths selected when mode != NVFP4 (untouched)</text>

  <!-- outputs -->
  <rect x="710" y="498" width="150" height="34" rx="4" fill="#dfeede" stroke="#4a8a4a" stroke-width="1.5"/>
  <text x="785" y="518" font-family="monospace" font-size="11" text-anchor="middle" fill="#222">result[31:0] (FP32)</text>

  <rect x="710" y="542" width="150" height="34" rx="4" fill="#dfeede" stroke="#4a8a4a" stroke-width="1.5"/>
  <text x="785" y="562" font-family="monospace" font-size="10" text-anchor="middle" fill="#222">status {inv,nan}</text>

  <!-- AG proof note -->
  <rect x="205" y="576" width="655" height="124" rx="6" fill="#fffbe6" stroke="#b8a11a" stroke-width="1.5"/>
  <text x="215" y="596" font-family="monospace" font-size="11" font-weight="bold" fill="#7a6a10">Assume-Guarantee top proof (blackbox lane, assert over pure DUT nets)</text>
  <text x="215" y="616" font-family="monospace" font-size="10" fill="#555">lane:  mul_lane_nvfp4 == ref_mul_nvfp4     (blackboxed above, assumed here; proven standalone)</text>
  <text x="215" y="632" font-family="monospace" font-size="10" fill="#555">top:   a_inner_is_lane_sum (inner_sum == Sum wide[i]) + a_align_lane (wide[i]==sign_ext(prod[i]))</text>
  <text x="215" y="648" font-family="monospace" font-size="10" fill="#555">       + a_scale_sig/exp/nan_ref  — all PURE DUT nets, no golden call in the miter</text>
  <text x="215" y="664" font-family="monospace" font-size="10" fill="#555">round: final_round_nvfp4 exact (directed sim vs golden)</text>
  <text x="215" y="682" font-family="monospace" font-size="10" fill="#555">=> result == dotprod_ref_nvfp4 by transitivity (unpack indexing DUT==golden, sign-ext widths match)</text>

  <!-- arrows -->
  <line x1="150" y1="126" x2="183" y2="128" stroke="#444" stroke-width="1.3" marker-end="url(#arrowhead)"/>
  <line x1="150" y1="150" x2="183" y2="140" stroke="#444" stroke-width="1.3" marker-end="url(#arrowhead)"/>
  <line x1="260" y1="154" x2="290" y2="206" stroke="#444" stroke-width="1.1" marker-end="url(#arrowhead)"/>
  <line x1="335" y1="132" x2="468" y2="200" stroke="#444" stroke-width="1.1" marker-end="url(#arrowhead)"/>
  <line x1="300" y1="254" x2="300" y2="290" stroke="#444" stroke-width="1.3" marker-end="url(#arrowhead)"/>
  <line x1="300" y1="334" x2="300" y2="354" stroke="#444" stroke-width="1.3" marker-end="url(#arrowhead)"/>
  <line x1="300" y1="398" x2="300" y2="418" stroke="#444" stroke-width="1.3" marker-end="url(#arrowhead)"/>
  <line x1="570" y1="254" x2="470" y2="418" stroke="#444" stroke-width="1.1" marker-end="url(#arrowhead)"/>
  <line x1="437" y1="470" x2="437" y2="494" stroke="#444" stroke-width="1.3" marker-end="url(#arrowhead)"/>
  <line x1="670" y1="516" x2="708" y2="516" stroke="#444" stroke-width="1.3" marker-end="url(#arrowhead)"/>
  <line x1="670" y1="525" x2="708" y2="556" stroke="#444" stroke-width="1.3" marker-end="url(#arrowhead)"/>
</svg>

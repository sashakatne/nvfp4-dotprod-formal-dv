<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="570" viewBox="0 0 1000 570">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 14px Arial, sans-serif; fill: #475569; }
      .box-title { font: 700 15px Arial, sans-serif; fill: #111827; }
      .box-text { font: 13px Arial, sans-serif; fill: #475569; }
      .tiny { font: 12px Arial, sans-serif; fill: #64748b; }
      .mono { font: 12px Menlo, Consolas, monospace; fill: #334155; }
    </style>
  </defs>

  <rect width="1000" height="570" fill="#fbfcfe"/>
  <text x="500" y="38" text-anchor="middle" class="title">NVFP4 Block-Scaled Datapath</text>
  <text x="500" y="62" text-anchor="middle" class="subtitle">Sixteen E2M1 elements share UE4M3 scales; the dot product factors into inner sum and scale product</text>

  <rect x="35" y="220" width="145" height="112" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="107.5" y="250" text-anchor="middle" class="box-title">packed inputs</text>
  <text x="107.5" y="276" text-anchor="middle" class="mono">a[8] / b[8]</text>
  <text x="107.5" y="296" text-anchor="middle" class="box-text">16 E2M1 values</text>
  <text x="107.5" y="316" text-anchor="middle" class="box-text">UE4M3 scales</text>

  <rect x="240" y="230" width="145" height="90" rx="10" fill="#e8f3ff" stroke="#2563eb" stroke-width="2"/>
  <text x="312.5" y="262" text-anchor="middle" class="box-title">unpack</text>
  <text x="312.5" y="286" text-anchor="middle" class="mono">e2m1[16]</text>
  <text x="312.5" y="306" text-anchor="middle" class="mono">scale A/B</text>

  <rect x="455" y="135" width="165" height="75" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="537.5" y="166" text-anchor="middle" class="box-title">lane products</text>
  <text x="537.5" y="189" text-anchor="middle" class="box-text">16 exact E2M1 multiplies</text>
  <rect x="455" y="255" width="165" height="75" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="537.5" y="286" text-anchor="middle" class="box-title">inner sum</text>
  <text x="537.5" y="309" text-anchor="middle" class="box-text">sign-extend and add</text>
  <rect x="455" y="375" width="165" height="75" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="537.5" y="406" text-anchor="middle" class="box-title">scale product</text>
  <text x="537.5" y="429" text-anchor="middle" class="box-text">UE4M3 A * B</text>

  <rect x="690" y="250" width="165" height="95" rx="10" fill="#e8f3ff" stroke="#2563eb" stroke-width="2"/>
  <text x="772.5" y="281" text-anchor="middle" class="box-title">final_round_nvfp4</text>
  <text x="772.5" y="305" text-anchor="middle" class="box-text">normalize to FP32</text>
  <text x="772.5" y="326" text-anchor="middle" class="tiny">NaN scale -> QNaN</text>

  <rect x="895" y="260" width="80" height="75" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="935" y="290" text-anchor="middle" class="box-title">FP32</text>
  <text x="935" y="313" text-anchor="middle" class="box-text">flags</text>

  <line x1="180" y1="276" x2="240" y2="276" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M385 276 H420 V172 H455" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M537 210 V255" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M385 276 H420 V412 H455" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M620 292 H690" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M620 412 H655 V318 H690" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="855" y1="298" x2="895" y2="298" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <rect x="690" y="120" width="285" height="112" rx="12" fill="#fffbea" stroke="#ca8a04" stroke-width="2"/>
  <text x="832.5" y="150" text-anchor="middle" class="box-title">formal proof shape</text>
  <text x="715" y="174" class="box-text">Lane and scale blocks</text>
  <text x="715" y="196" class="box-text">are proven standalone.</text>
  <text x="715" y="218" class="box-text">Top proof uses DUT nets only.</text>

  <rect x="240" y="495" width="735" height="42" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="607.5" y="521" text-anchor="middle" class="box-text">Factorization: dot(a*sA, b*sB) = (sA*sB) * sum(a_i*b_i).</text>
</svg>
